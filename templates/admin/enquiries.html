<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Enquiries Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/simulations/style.css') }}">
    <style>
        .filter-group { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .filter-btn { padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 999px; cursor: pointer; background: white; }
        .filter-btn.active { background: #333; color: white; border-color: #333; }
        .success-toast { padding: 1rem; background: #dcfce7; color: #166534; border-radius: 8px; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo">Maths<span>Lab</span> Admin</div>
        <nav>
            <a href="/simulations/coordinate-geometry">Simulations</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
    </header>

    <main class="sim-container" style="max-width: 1200px;">
        <div id="toast" class="success-toast"></div>
        <h2>Enquiry Management</h2>
        
        <div class="filter-group">
            <button class="filter-btn active" onclick="filterTable('All')">All</button>
            <button class="filter-btn" onclick="filterTable('New')">New</button>
            <button class="filter-btn" onclick="filterTable('Contacted')">Contacted</button>
            <button class="filter-btn" onclick="filterTable('Converted')">Converted</button>
        </div>

        <div class="module-card" style="padding: 0; overflow-x: auto;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name / Phone</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="enquiryBody">
                    {% for eq in enquiries %}
                    <tr data-status="{{ eq.status }}">
                        <td>{{ eq.date }}</td>
                        <td>
                            <strong>{{ eq.name }}</strong><br>
                            <small>{{ eq.phone }}</small>
                        </td>
                        <td>{{ eq.message }}</td>
                        <td><span class="badge {{ eq.status.lower() }}">{{ eq.status }}</span></td>
                        <td><button class="action-btn" onclick="setReminder('{{ eq.id }}')">Set Reminder</button></td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" style="text-align:center;">No enquiries found. Let's wait for submissions!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function filterTable(status) {
            // UI Toggle
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText === status) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Table Filter
            const rows = document.querySelectorAll('#enquiryBody tr');
            rows.forEach(row => {
                if (status === 'All' || row.dataset.status === status) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        async function setReminder(id) {
            try {
                const res = await fetch("/admin/reminder", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                
                const toast = document.getElementById('toast');
                toast.textContent = data.message;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 3000);
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
