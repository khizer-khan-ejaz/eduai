<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Cell Simulation — EduAI Biology Lab</title>
    <meta name="description" content="Explore plant and animal cells in an interactive 3D virtual lab. Click on organelles to learn about their structure and function.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/3d-cell.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Three.js r160 via importmap for modern ES module support -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- ─── Ambient Particles Background ─── -->
    <canvas id="particle-bg" aria-hidden="true"></canvas>

    <!-- ─── Top Navigation ─── -->
    <header class="cell-header" id="cell-header">
        <a href="/learn" class="back-link" id="back-link" title="Back to Learning Hub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Back</span>
        </a>
        <div class="logo" id="logo-title">
            <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
            <span>Biology <em>3D Lab</em></span>
        </div>
        <div class="toggle-group" id="cell-toggle-group">
            <button id="btn-plant" class="toggle-btn active" data-cell="plant">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
                Plant Cell
            </button>
            <button id="btn-animal" class="toggle-btn" data-cell="animal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                Animal Cell
            </button>
        </div>
        <div class="header-controls">
            <button id="btn-autorotate" class="icon-btn" title="Toggle Auto-Rotate">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6"/><path d="M21.34 13.72A10 10 0 1 1 18.57 4.93L21.5 8"/></svg>
            </button>
            <button id="btn-reset-cam" class="icon-btn" title="Reset Camera">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
            <button id="btn-fullscreen" class="icon-btn" title="Fullscreen">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
        </div>
    </header>

    <!-- ─── Main Layout ─── -->
    <main class="sim-wrapper" id="sim-wrapper">
        <!-- 3D Canvas Area -->
        <div class="canvas-container" id="canvas-container">
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="loader-content">
                    <div class="dna-helix-loader">
                        <div class="helix-strand"></div>
                        <div class="helix-strand"></div>
                        <div class="helix-strand"></div>
                    </div>
                    <h3 id="loading-title">Preparing Cell Simulation</h3>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="loading-progress"></div>
                    </div>
                    <p class="loading-tip" id="loading-tip">Did you know? A single human cell contains about 6 feet of DNA.</p>
                </div>
            </div>
            <!-- Hover Tooltip -->
            <div class="hover-tooltip" id="hover-tooltip"></div>
            <!-- Canvas appended by scene.js -->
        </div>

        <!-- Info Panel -->
        <aside class="info-panel" id="info-panel">
            <div class="panel-scroll">
                <!-- Default State -->
                <div id="info-content" class="info-content empty-state">
                    <div class="empty-hero">
                        <div class="empty-icon-ring">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
                        </div>
                        <h2>Explore the Cell</h2>
                        <p>Click on any organelle in the 3D viewer to discover its structure and function.</p>
                    </div>
                    <div class="controls-hint">
                        <div class="hint-row"><kbd>🖱️ Left Drag</kbd> <span>Rotate</span></div>
                        <div class="hint-row"><kbd>🖱️ Right Drag</kbd> <span>Pan</span></div>
                        <div class="hint-row"><kbd>🖱️ Scroll</kbd> <span>Zoom</span></div>
                    </div>
                    <div class="organelle-list" id="organelle-list">
                        <h4>Organelles</h4>
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- ─── Global Configuration ─── -->
    <script>
        window.STATIC_URLS = {
            plantCell: "{{ url_for('static', filename='img/plant_cell.glb') }}",
            plantCellAlt1: "{{ url_for('static', filename='img/plantCell.glb') }}",
            plantCellAlt2: "{{ url_for('static', filename='img/bio_project_plant_cell.glb') }}"
        };
    </script>

    <!-- ─── Application Entry Point (ES Module) ─── -->
    <script type="module" src="{{ url_for('static', filename='js/3d/app.js') }}"></script>
</body>
</html>
